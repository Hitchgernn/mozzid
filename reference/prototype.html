<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#05070b">
<title>MozzID — Mosquito species identifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#05070b; font-family:'IBM Plex Sans',sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { color:var(--accent-hi); }
  ::-webkit-scrollbar { width:0; height:0; }
  button { font-family:inherit; }
  @keyframes mzFloat { 0%,100%{ transform:translateY(0) rotate(-1deg);} 50%{ transform:translateY(-9px) rotate(1deg);} }
  @keyframes mzWing { 0%,100%{ transform:scaleY(1) rotate(-28deg);} 50%{ transform:scaleY(0.7) rotate(-34deg);} }
  @keyframes mzWingR { 0%,100%{ transform:scaleY(1) rotate(28deg);} 50%{ transform:scaleY(0.7) rotate(34deg);} }
  @keyframes mzRing { 0%{ transform:scale(0.55); opacity:0.55;} 80%{ opacity:0.06;} 100%{ transform:scale(1.5); opacity:0;} }
  @keyframes mzBar { 0%,100%{ transform:scaleY(0.28);} 50%{ transform:scaleY(1);} }
  @keyframes mzSpec { 0%{ transform:scaleY(0.15);} 100%{ transform:scaleY(1);} }
  @keyframes mzFade { from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:translateY(0);} }
  @keyframes mzPop { 0%{ opacity:0; transform:scale(0.9);} 100%{ opacity:1; transform:scale(1);} }
  @keyframes mzGlow { 0%,100%{ box-shadow:0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent), 0 20px 60px -18px color-mix(in srgb, var(--accent) 50%, transparent);} 50%{ box-shadow:0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent), 0 26px 80px -14px color-mix(in srgb, var(--accent) 75%, transparent);} }
  @keyframes mzPin { 0%{ transform:translate(-50%,-100%) scale(0);} 60%{ transform:translate(-50%,-100%) scale(1.15);} 100%{ transform:translate(-50%,-100%) scale(1);} }
  @keyframes mzSlide { from{ transform:translateY(101%);} to{ transform:translateY(0);} }
  @keyframes mzDot { 0%,100%{ opacity:0.3;} 50%{ opacity:1;} }
  @keyframes mzScan { 0%{ transform:translateX(-100%);} 100%{ transform:translateX(220%);} }
  .mzScreen { animation:mzFade 0.4s cubic-bezier(.2,.7,.2,1) both; }
  #stage { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; background:radial-gradient(1200px 700px at 50% -10%, #0d1520 0%, #05070b 60%); }
  #device { position:relative; width:392px; height:844px; max-width:100vw; border-radius:52px; padding:11px; background:linear-gradient(150deg,#242c38,#0c0f15 55%); box-shadow:0 50px 120px -30px rgba(0,0,0,0.85), 0 0 0 1px var(--fill,rgba(255,255,255,0.04)); }
  @media (max-width:430px){ #stage{ padding:0; } #device{ width:100vw; height:100vh; height:100dvh; border-radius:0; padding:0; } #screen{ border-radius:0 !important; } }
</style>
</head>
<body>
<div id="stage">
  <div id="device">
    <div id="screen"></div>
  </div>
</div>

<script>
"use strict";
(function () {

  var STR = {
    EN: {
      offline:'Works offline', heardBuzz:'Heard a buzz?', tapHold:'Tap and hold near the sound.',

      gotIt:'Got it', skip:'Skip', micTitle:'Microphone', micNote:'To hear the wingbeat', allow:'Allow',

      matching:'Mencocokkan frekuensi sayap…', onDevice:'Model di perangkat · offline',
      recordAgain:'Rekam lagi', speaking:'Membacakan hasil', carries:'Membawa', identifiedAs:'Teridentifikasi sebagai',
      confidence:'Keyakinan', wingbeat:'Frek. sayap', couldAlso:'Bisa juga', saveLog:'Simpan ke log',
      history:'Riwayat', record:'Rekam', settings:'Pengaturan', logged:'tercatat', totalDetections:'Total deteksi',
      mostActive:'Paling aktif', detectionsNear:'Deteksi Anda · peta offline', language:'Bahasa',
      langNote:'Bahasa Indonesia / English', voiceOut:'Keluaran suara', voiceNote:'Bacakan hasil dengan suara',
      bgListen:'Dengar latar', bgNote:'Dengar semalam · hemat baterai', morningReady:'Ringkasan pagi siap',
      viewSummary:'Lihat semalam →', notifications:'Notifikasi', previewNotif:'Pratinjau notifikasi',
      data:'Data', exportCsv:'Ekspor data (CSV)', replayIntro:'Ulangi intro', emptyTitle:'Belum ada deteksi',
      emptyBody:'Tangkap dengungan pertama, akan muncul di sini dengan waktu & lokasi.',
      activeHours:'Jam aktif', prevention:'Pencegahan', close:'Tutup',
      appearance:'Tampilan', appearanceNote:'Tema terang atau gelap', dark:'Gelap', light:'Terang', accentLabel:'Warna aksen', accentNote:'Ketuk warna untuk menerapkannya.',
      goodMorning:'SELAMAT PAGI', morningHead:'3 nyamuk terdeteksi semalam', overnightTimeline:'Linimasa semalam',
      gotIt:'Mengerti', skip:'Lewati', micTitle:'Mikrofon', micNote:'Untuk mendengar sayap', allow:'Izinkan',
      locTitle:'Lokasi', locNote:'Untuk memetakan deteksi', notif1Title:'Aktivitas vektor dengue tinggi malam ini',
      notif1Body:'3 deteksi Aedes tercatat di dekat Anda dalam sejam terakhir.', notif2Title:'Senja jam puncak gigitan',
      notif2Body:'Aedes paling aktif sekarang — saat tepat untuk cek.',
    },
  };

  var DB = {
    aedes:     { name:'Aedes aegypti', common:'Yellow fever mosquito', diseases:'Dengue & Zika', freq:'~600 Hz', freqRange:'450–700 Hz', sev:'high',
      active:'Day · dawn/dusk', note:'A daytime biter thriving in urban water containers. The primary vector of dengue across tropical cities.',
      tips:['Empty standing water in pots, tyres and gutters weekly.','Use screens and repellent during daylight hours.','Wear long sleeves at dawn and dusk.'] },
    culex:     { name:'Culex quinquefasciatus', common:'Southern house mosquito', diseases:'West Nile & filariasis', freq:'~350 Hz', freqRange:'300–450 Hz', sev:'moderate',
      active:'Night', note:'A night-active house mosquito, drawn to polluted stagnant water. A vector of lymphatic filariasis.',
      tips:['Clear drains and polluted stagnant water.','Sleep under a bed net at night.','Fit window and door screens.'] },
    anopheles: { name:'Anopheles sundaicus', common:'Malaria mosquito', diseases:'Malaria', freq:'~500 Hz', freqRange:'400–600 Hz', sev:'high',
      active:'Night · dusk to dawn', note:'The malaria vector, biting from dusk to dawn. Rests at a distinctive head-down angle.',
      tips:['Sleep under an insecticide-treated net.','Use indoor residual spraying where advised.','Cover skin after sunset.'] },
  };

  var SEV = {
    high:     { glyph:'▲', color:'#ff8a7a', label:'High risk',    bg:'rgba(255,138,122,0.1)',  border:'rgba(255,138,122,0.28)', iconBg:'rgba(255,138,122,0.16)' },
    moderate: { glyph:'●', color:'#ffcf6b', label:'Moderate risk',bg:'rgba(255,207,107,0.09)', border:'rgba(255,207,107,0.26)', iconBg:'rgba(255,207,107,0.15)' },
    low:      { glyph:'■', color:'#7fd0ff', label:'Low risk',     bg:'rgba(127,208,255,0.08)', border:'rgba(127,208,255,0.24)', iconBg:'rgba(127,208,255,0.14)' },
  };
  var DOT = { aedes:'#ff8a7a', culex:'#7fd0ff', anopheles:'#ffcf6b' };
  var ACCENTS = {
    teal:   { a:'#2dd4bf', a2:'#12a695', hi:'#34e6d1', ink:'#04211d' },
    lime:   { a:'#84cc16', a2:'#4d7c0f', hi:'#bef264', ink:'#152400' },
    amber:  { a:'#f5a623', a2:'#b45309', hi:'#fbbf24', ink:'#2a1600' },
    indigo: { a:'#8b93f8', a2:'#4f46e5', hi:'#a5b4fc', ink:'#0a0f2a' },
  };

  // ---------- state ----------
  var S = {
    lang:'EN', tab:'record', phase:'idle', onboarded:false, obStep:0,
    theme:'dark', accent:'teal', progress:0, result:null, speciesId:null,
    morningOpen:false, showNotif:false, toast:null, filterSpecies:'all', filterRange:'all',
    voice:false, background:true,
    log:[
      { id:1, sp:'aedes',    time:'11:42 PM', loc:'Bedroom',  date:'Tonight',    conf:87, days:0, left:'40%', top:'55%' },
      { id:2, sp:'culex',    time:'10:05 PM', loc:'Balcony',  date:'Tonight',    conf:79, days:0, left:'68%', top:'38%' },
      { id:3, sp:'aedes',    time:'6:20 AM',  loc:'Kitchen',  date:'Yesterday',  conf:91, days:1, left:'25%', top:'70%' },
      { id:4, sp:'anopheles',time:'2:15 AM',  loc:'Bedroom',  date:'2 days ago', conf:74, days:2, left:'55%', top:'25%' },
      { id:5, sp:'aedes',    time:'7:50 PM',  loc:'Garden',   date:'4 days ago', conf:83, days:4, left:'80%', top:'62%' },
      { id:6, sp:'culex',    time:'9:30 PM',  loc:'Living rm',date:'6 days ago', conf:68, days:6, left:'18%', top:'40%' },
    ],
  };

  // ---------- timers ----------
  var T = {};
  function set(patch){ for (var k in patch) S[k] = patch[k]; render(); }

  // ---------- mascot ----------
  function mascot(sz){
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 120 120" fill="none" style="overflow:visible">'
      + '<ellipse cx="46" cy="44" rx="27" ry="11" fill="rgba(45,212,191,0.22)" stroke="rgba(45,212,191,0.4)" stroke-width="1" style="transform-origin:46px 44px; animation:mzWing 0.5s ease-in-out infinite"/>'
      + '<ellipse cx="74" cy="44" rx="27" ry="11" fill="rgba(45,212,191,0.22)" stroke="rgba(45,212,191,0.4)" stroke-width="1" style="transform-origin:74px 44px; animation:mzWingR 0.5s ease-in-out infinite"/>'
      + '<line x1="60" y1="70" x2="52" y2="104" stroke="#0e9384" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="60" y1="72" x2="68" y2="104" stroke="#0e9384" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="56" y1="68" x2="40" y2="96" stroke="#0e9384" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="64" y1="68" x2="80" y2="96" stroke="#0e9384" stroke-width="2.5" stroke-linecap="round"/>'
      + '<ellipse cx="60" cy="82" rx="15" ry="24" fill="#17b9a6"/>'
      + '<line x1="47" y1="80" x2="73" y2="80" stroke="rgba(4,33,29,0.25)" stroke-width="2"/>'
      + '<line x1="48" y1="90" x2="72" y2="90" stroke="rgba(4,33,29,0.25)" stroke-width="2"/>'
      + '<circle cx="60" cy="58" r="13" fill="#20c4b1"/>'
      + '<circle cx="60" cy="42" r="15" fill="#34e6d1"/>'
      + '<circle cx="54" cy="41" r="5.5" fill="var(--accent-ink)"/>'
      + '<circle cx="66" cy="41" r="5.5" fill="var(--accent-ink)"/>'
      + '<circle cx="55.6" cy="39.4" r="1.9" fill="#fff"/>'
      + '<circle cx="67.6" cy="39.4" r="1.9" fill="#fff"/>'
      + '<line x1="60" y1="52" x2="60" y2="66" stroke="#0e9384" stroke-width="2" stroke-linecap="round"/>'
      + '<line x1="53" y1="30" x2="46" y2="16" stroke="#34e6d1" stroke-width="2" stroke-linecap="round"/>'
      + '<line x1="67" y1="30" x2="74" y2="16" stroke="#34e6d1" stroke-width="2" stroke-linecap="round"/>'
      + '<circle cx="46" cy="15" r="2.6" fill="#34e6d1"/>'
      + '<circle cx="74" cy="15" r="2.6" fill="#34e6d1"/>'
      + '</svg>';
  }

  // ---------- handlers ----------
  var App = {
    startHold:function(){
      if (S.phase !== 'idle') return;
      set({ phase:'listening', progress:0, showNotif:false });
      var dur = 4000, t0 = performance.now();
      function step(){
        var p = Math.min(100, ((performance.now()-t0)/dur)*100);
        S.progress = p;
        var ring = document.getElementById('progRing');
        var pct = document.getElementById('progPct');
        if (ring){ ring.setAttribute('stroke-dashoffset', CIRC*(1-p/100)); }
        if (pct){ pct.textContent = Math.round(p)+'%'; }
        if (p >= 100){ App.finishListen(); return; }
        T.raf = requestAnimationFrame(step);
      }
      T.raf = requestAnimationFrame(step);
    },
    endHold:function(){
      if (S.phase !== 'listening') return;
      if (S.progress >= 100) return;
      cancelAnimationFrame(T.raf);
      set({ phase:'idle', progress:0 });
    },
    finishListen:function(){
      cancelAnimationFrame(T.raf);
      set({ phase:'analyzing' });
      T.ana = setTimeout(function(){
        var ids = ['aedes','culex','anopheles'];
        var primary = ids[Math.floor(Math.random()*ids.length)];
        var runner = ids[Math.floor(Math.random()*ids.length)];
        while (runner === primary) runner = ids[Math.floor(Math.random()*ids.length)];
        var conf = 78 + Math.floor(Math.random()*17);
        var rconf = 100 - conf - Math.floor(Math.random()*6);
        set({ phase:'result', result:{ primary:primary, runner:runner, conf:conf, rconf:Math.max(3,rconf) } });
      }, 1700);
    },
    retry:function(){ set({ phase:'idle', progress:0, result:null }); },
    saveResult:function(){
      var r = S.result; if (!r) return;
      var entry = { id:Date.now(), sp:r.primary, time:'Just now', loc:'Current spot', date:'Tonight', conf:r.conf, days:0, left:(30+Math.random()*40)+'%', top:(30+Math.random()*40)+'%' };
      S.log = [entry].concat(S.log);
      set({ phase:'idle', progress:0, result:null, tab:'history' });
      toast(S.lang==='EN' ? 'Saved to log' : 'Tersimpan ke log');
    },
    shareResult:function(){ toast(S.lang==='EN' ? 'Shareable card created' : 'Kartu berbagi dibuat'); },
    openSpeciesId:function(id){ set({ speciesId:id }); },
    closeSpecies:function(){ set({ speciesId:null }); },
    setTab:function(t){ set({ tab:t, showNotif:false }); },
    toggleVoice:function(){ set({ voice:!S.voice }); },
    toggleBackground:function(){ set({ background:!S.background }); },
    setLang:function(l){ set({ lang:l }); },
    setDark:function(){ set({ theme:'dark' }); },
    setLight:function(){ set({ theme:'light' }); },
    setAccent:function(a){ set({ accent:a }); },
    openMorning:function(){ set({ morningOpen:true }); },
    closeMorning:function(){ set({ morningOpen:false }); },
    previewNotif:function(){ set({ showNotif:true }); clearTimeout(T.notif2); T.notif2 = setTimeout(function(){ set({ showNotif:false }); }, 4500); },
    exportData:function(){ toast(S.lang==='EN' ? 'Exported mozzid_log.csv' : 'Diekspor mozzid_log.csv'); },
    replayOnboard:function(){ set({ onboarded:false, obStep:0 }); },
    nextOnboard:function(){ if (S.obStep < 2) set({ obStep:S.obStep+1 }); else App.finishOnboard(); },
    finishOnboard:function(){ set({ onboarded:true, obStep:0 }); scheduleNotif(1200, 4200); },
    setFilterSpecies:function(id){ set({ filterSpecies:id }); },
    setFilterRange:function(id){ set({ filterRange:id }); },
    noop:function(e){ if (e) e.stopPropagation(); },
  };
  window.App = App;

  function toast(msg){
    clearTimeout(T.toast);
    set({ toast:msg });
    T.toast = setTimeout(function(){ set({ toast:null }); }, 2200);
  }
  function scheduleNotif(showAt, hideAt){
    clearTimeout(T.notif); clearTimeout(T.notif2);
    T.notif = setTimeout(function(){ set({ showNotif:true }); }, showAt);
    T.notif2 = setTimeout(function(){ set({ showNotif:false }); }, hideAt);
  }

  // ---------- derive theme ----------
  var CIRC = 2 * Math.PI * 126;

  function themeVars(){
    var dark = S.theme !== 'light';
    var AC = ACCENTS[S.accent] || ACCENTS.teal;
    var TT = dark
      ? { bg:'#080b11', s1:'#0f141d', s2:'#0d121a', s3:'#0c1119', t1:'#eef3f9', t2:'#c6d0dd', t3:'#93a1b3', t4:'#6b7788', fa:'#4a5567', ln:'rgba(255,255,255,0.06)', ln2:'rgba(255,255,255,0.12)', fl:'rgba(255,255,255,0.04)' }
      : { bg:'#e7ebf1', s1:'#ffffff', s2:'#eef2f7', s3:'#ffffff', t1:'#0f1720', t2:'#33414f', t3:'#5a6675', t4:'#8592a1', fa:'#aeb8c4', ln:'rgba(16,24,35,0.10)', ln2:'rgba(16,24,35,0.18)', fl:'rgba(16,24,35,0.05)' };
    var softText = dark ? AC.hi : AC.a2;
    return { dark:dark, AC:AC,
      vars:'--bg:'+TT.bg+'; --surface:'+TT.s1+'; --surface2:'+TT.s2+'; --surface3:'+TT.s3+'; --text:'+TT.t1+'; --text2:'+TT.t2+'; --text3:'+TT.t3+'; --text4:'+TT.t4+'; --faint:'+TT.fa+'; --line:'+TT.ln+'; --line2:'+TT.ln2+'; --fill:'+TT.fl+'; --accent:'+AC.a+'; --accent2:'+AC.a2+'; --accent-hi:'+AC.hi+'; --accent-ink:'+AC.ink+'; --accent-soft-text:'+softText+';',
      softText:softText };
  }

  // ---------- screens ----------
  function statusBar(){
    return '<div style="position:absolute; top:0; left:0; right:0; height:52px; z-index:40; display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 8px; font-family:\'IBM Plex Mono\',monospace; font-size:14px; font-weight:600; color:var(--text); pointer-events:none;">'
      + '<span>2:14</span>'
      + '<div style="position:absolute; left:50%; top:9px; transform:translateX(-50%); width:112px; height:30px; background:#000; border-radius:16px;"></div>'
      + '<div style="display:flex; gap:6px; align-items:center;"><span style="font-size:12px; letter-spacing:0.5px;">5G</span>'
      + '<div style="width:24px; height:12px; border:1.5px solid var(--text); border-radius:3px; position:relative;"><div style="position:absolute; inset:1.5px; right:6px; background:var(--text); border-radius:1px;"></div></div></div></div>';
  }

  function recordScreen(L){
    var idle = S.phase === 'idle', listening = S.phase === 'listening', analyzing = S.phase === 'analyzing';
    var pct = Math.round(S.progress);
    var recordArea = '';
    if (idle){
      recordArea = '<div style="position:relative; width:264px; height:264px; display:flex; align-items:center; justify-content:center;">'
        + '<div style="position:absolute; inset:0; border-radius:50%; border:1px solid color-mix(in srgb, var(--accent) 14%, transparent);"></div>'
        + '<div style="position:absolute; inset:26px; border-radius:50%; border:1px solid color-mix(in srgb, var(--accent) 10%, transparent);"></div>'
        + '<button onpointerdown="App.startHold()" onpointerup="App.endHold()" onpointerleave="App.endHold()" style="position:relative; width:184px; height:184px; border-radius:50%; border:none; cursor:pointer; background:radial-gradient(circle at 50% 38%, var(--accent-hi) 0%, var(--accent2) 55%, var(--accent2) 100%); animation:mzGlow 3.4s ease-in-out infinite; display:flex; align-items:center; justify-content:center; touch-action:none;">'
        + '<svg width="52" height="52" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="12" rx="3" fill="var(--accent-ink)"/><path d="M6 11a6 6 0 0 0 12 0M12 17v3.5" stroke="var(--accent-ink)" stroke-width="1.9" stroke-linecap="round"/></svg>'
        + '</button></div>';
    } else if (listening){
      recordArea = '<div style="position:relative; width:264px; height:264px; display:flex; align-items:center; justify-content:center;">'
        + '<span style="position:absolute; width:190px; height:190px; border-radius:50%; background:color-mix(in srgb, var(--accent) 16%, transparent); animation:mzRing 2.4s ease-out infinite;"></span>'
        + '<span style="position:absolute; width:190px; height:190px; border-radius:50%; background:color-mix(in srgb, var(--accent) 13%, transparent); animation:mzRing 2.4s ease-out infinite; animation-delay:0.8s;"></span>'
        + '<span style="position:absolute; width:190px; height:190px; border-radius:50%; background:color-mix(in srgb, var(--accent) 10%, transparent); animation:mzRing 2.4s ease-out infinite; animation-delay:1.6s;"></span>'
        + '<svg width="264" height="264" viewBox="0 0 264 264" style="position:absolute; transform:rotate(-90deg);">'
        + '<circle cx="132" cy="132" r="126" fill="none" stroke="var(--line)" stroke-width="5"/>'
        + '<circle id="progRing" cx="132" cy="132" r="126" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+CIRC+'" stroke-dashoffset="'+(CIRC*(1-S.progress/100))+'" style="transition:stroke-dashoffset 0.08s linear; filter:drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 60%, transparent));"/></svg>'

      { title: S.lang==='EN'?'Catch a good sample':'Tangkap sampel bagus', body: S.lang==='EN'?'Get close to the buzz, hold steady, and keep background noise low for the clearest wingbeat.':'Dekati dengungan, tahan stabil, dan jaga bising rendah untuk sayap paling jernih.', cta:S.lang==='EN'?'Next':'Lanjut', showPerms:false },
      { title: S.lang==='EN'?'Works fully offline':'Sepenuhnya offline', body: S.lang==='EN'?'The species model runs entirely on your phone. No signal, no data — your detections stay private.':'Model spesies berjalan di ponsel Anda. Tanpa sinyal, tanpa data — deteksi tetap privat.', cta:S.lang==='EN'?'Next':'Lanjut', showPerms:false },
      { title: S.lang==='EN'?'Two quick permissions':'Dua izin singkat', body: S.lang==='EN'?'MozzID needs your mic to hear the wingbeat and location to map where you found it.':'MozzID butuh mik untuk mendengar sayap dan lokasi untuk memetakan temuan.', cta:S.lang==='EN'?'Start listening':'Mulai', showPerms:true },
    ];
    var ob = obData[S.obStep];
    var perms = ob.showPerms
      ? '<div style="margin-top:22px; display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px;">'
        + '<div style="display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:14px; background:var(--surface); border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);">'
        + '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="12" rx="3" stroke="var(--accent)" stroke-width="1.8"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"/></svg>'
        + '<div style="flex:1; text-align:left;"><div style="font-size:13.5px; color:var(--text); font-weight:600;">'+L.micTitle+'</div><div style="font-size:11.5px; color:var(--text4);">'+L.micNote+'</div></div>'
        + '<span style="font-size:12px; color:var(--accent); font-weight:600;">'+L.allow+'</span></div>'
        + '<div style="display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:14px; background:var(--surface); border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);">'
        + '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z" stroke="var(--accent)" stroke-width="1.8"/><circle cx="12" cy="9" r="2.5" stroke="var(--accent)" stroke-width="1.8"/></svg>'
        + '<div style="flex:1; text-align:left;"><div style="font-size:13.5px; color:var(--text); font-weight:600;">'+L.locTitle+'</div><div style="font-size:11.5px; color:var(--text4);">'+L.locNote+'</div></div>'
        + '<span style="font-size:12px; color:var(--accent); font-weight:600;">'+L.allow+'</span></div></div>'
      : '';
    var dots = [0,1,2].map(function(i){
      var w = i===S.obStep?'22px':'7px';
      var color = i===S.obStep?'var(--accent)':'var(--line2)';
      return '<span style="height:7px; border-radius:4px; transition:all 0.3s; width:'+w+'; background:'+color+';"></span>';
    }).join('');
    return '<div style="position:absolute; inset:0; z-index:60; background:radial-gradient(900px 500px at 50% 0%, var(--surface3), var(--bg) 60%); animation:mzFade 0.3s both; display:flex; flex-direction:column; padding:56px 30px 30px;">'
      + '<div style="display:flex; justify-content:flex-end; flex-shrink:0;"><button onclick="App.finishOnboard()" style="background:none; border:none; color:var(--text4); font-size:14px; cursor:pointer;">'+L.skip+'</button></div>'
      + '<div style="flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:10px 0;">'
      + '<div style="animation:mzFloat 4s ease-in-out infinite; margin-bottom:8px;">'+mascot(112)+'</div>'
      + '<h1 style="font-family:\'Spectral\',serif; font-weight:600; font-size:27px; color:var(--text); margin-top:24px; line-height:1.25; text-wrap:balance;">'+ob.title+'</h1>'
      + '<p style="font-size:15px; color:var(--text3); margin-top:12px; line-height:1.55; max-width:280px;">'+ob.body+'</p>'+perms+'</div>'
      + '<div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:22px;">'+dots+'</div>'
      + '<button onclick="App.nextOnboard()" style="width:100%; height:54px; border-radius:16px; border:none; background:linear-gradient(180deg,var(--accent),var(--accent2)); color:var(--accent-ink); font-size:16px; font-weight:700; cursor:pointer;">'+ob.cta+'</button></div>';
  }

  function notifBanner(L){
    if (!S.showNotif) return '';
    return '<div style="position:absolute; top:56px; left:12px; right:12px; z-index:70; animation:mzPop 0.35s cubic-bezier(.2,.8,.2,1) both;">'
      + '<div style="border-radius:20px; padding:14px 15px; background:rgba(18,24,34,0.92); backdrop-filter:blur(20px); border:1px solid var(--line2); box-shadow:0 18px 50px -12px rgba(0,0,0,0.7); display:flex; gap:12px; align-items:flex-start;">'
      + '<div style="width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--accent),var(--accent2)); flex-shrink:0; display:flex; align-items:center; justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="9" y="4" width="6" height="10" rx="3" fill="var(--accent-ink)"/><path d="M6 11a6 6 0 0 0 12 0" stroke="var(--accent-ink)" stroke-width="1.9" stroke-linecap="round"/></svg></div>'
      + '<div style="flex:1;"><div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-size:11px; font-weight:700; color:var(--accent-soft-text); letter-spacing:0.3px;">MOZZID</span><span style="font-size:10.5px; color:var(--text4); font-family:\'IBM Plex Mono\',monospace;">now</span></div>'
      + '<div style="font-size:13.5px; color:var(--text); font-weight:600; margin-top:3px;">'+L.notif1Title+'</div>'
      + '<div style="font-size:12.5px; color:var(--text2); margin-top:2px; line-height:1.4;">'+L.notif1Body+'</div></div></div></div>';
  }
  function toastEl(){
    if (!S.toast) return '';
    return '<div style="position:absolute; bottom:100px; left:50%; transform:translateX(-50%); z-index:65; animation:mzPop 0.3s both;">'
      + '<div style="padding:12px 18px; border-radius:14px; background:rgba(18,24,34,0.95); backdrop-filter:blur(16px); border:1px solid color-mix(in srgb, var(--accent) 25%, transparent); box-shadow:0 14px 40px -10px rgba(0,0,0,0.7); display:flex; align-items:center; gap:9px; white-space:nowrap;">'
      + '<span style="width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent);"></span>'
      + '<span style="font-size:13.5px; color:var(--text); font-weight:500;">'+S.toast+'</span></div></div>';
  }

  // ---------- render ----------
  function render(){
    var L = STR[S.lang];
    var tv = themeVars();
    var body = '';
    if (S.tab==='record' && S.phase==='result') body = resultScreen(L);
    else if (S.tab==='record') body = recordScreen(L);
    else if (S.tab==='history') body = historyScreen(L);
    else if (S.tab==='settings') body = settingsScreen(L);

    var html = statusBar() + body + bottomNav(L)
      + speciesCard(L) + morningOverlay(L) + onboardingOverlay(L)
      + notifBanner(L) + toastEl();

    var screen = document.getElementById('screen');
    screen.setAttribute('style', 'position:relative; width:100%; height:100%; border-radius:42px; overflow:hidden; background:var(--bg); transition:background .35s; '+tv.vars);
    screen.innerHTML = html;
    document.querySelector('meta[name=theme-color]').setAttribute('content', tv.dark ? '#080b11' : '#e7ebf1');
  }

  // ---------- boot ----------
  render();
  if (S.onboarded) scheduleNotif(1400, 6200);
})();
</script>
</body>
</html>
